; Two build targets sharing the same source tree.  Layout/capability
; differences live in src/board_config.h, gated by the explicit
; BOARD_STICKC_PLUS / BOARD_CORE2 build flags below.
;
; Default build (when running `pio run` with no -e flag): StickC Plus,
; matching the original upstream firmware.  Build for Core2 explicitly:
;   pio run -e m5stack-core2 -t upload

[platformio]
default_envs = m5stickc-plus

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
board_build.partitions = no_ota.csv
build_src_filter = +<*> +<buddies/>
lib_deps =
    m5stack/M5Unified @ ^0.1.17
    bitbank2/AnimatedGIF @ ^2.1.1
    bblanchon/ArduinoJson @ ^7.0.0

[env:m5stickc-plus]
board = m5stick-c
board_build.f_cpu = 160000000L
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_STICKC_PLUS=1

[env:m5stack-core2]
board = m5stack-core2
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_CORE2=1
